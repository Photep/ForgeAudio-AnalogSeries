<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="11.99mm" height="11.99mm"
     viewBox="0 0 11.99 11.99">
  <defs>
    <radialGradient id="secondary-body" cx="38%" cy="28%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="secondary-cap" cx="44%" cy="38%">
      <stop offset="0%" stop-color="#282828"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <linearGradient id="secondary-indicator" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f08040"/>
      <stop offset="100%" stop-color="#c04020"/>
    </linearGradient>
  </defs>
  <!-- Knob body -->
  <circle cx="6.0" cy="6.0" r="5.5" fill="url(#secondary-body)"/>
  <!-- Machined groove texture -->
  <circle cx="6.0" cy="6.0" r="4.8" fill="none" stroke="#ffffff" stroke-width="0.08" stroke-opacity="0.025"/>
  <circle cx="6.0" cy="6.0" r="4.0" fill="none" stroke="#000000" stroke-width="0.08" stroke-opacity="0.025"/>
  <circle cx="6.0" cy="6.0" r="3.2" fill="none" stroke="#ffffff" stroke-width="0.08" stroke-opacity="0.02"/>
  <!-- Center cap indent -->
  <circle cx="6.0" cy="6.0" r="1.4" fill="url(#secondary-cap)"/>
  <!-- Indicator line at 12 o'clock (0.8mm wide, 28% height = 3.36mm) -->
  <rect x="5.6" y="0.60" width="0.8" height="3.36" rx="0.25" fill="url(#secondary-indicator)"/>
  <!-- Indicator glow halo -->
  <circle cx="6.0" cy="1.1" r="0.9" fill="#e85d26" opacity="0.25"/>
</svg>
