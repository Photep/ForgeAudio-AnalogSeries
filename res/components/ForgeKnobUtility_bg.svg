<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="10.50mm" height="10.50mm"
     viewBox="0 0 10.5 10.5">
  <defs>
    <radialGradient id="utility-bg-shadow">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Drop shadow (offset 0.4mm down) -->
  <circle cx="5.25" cy="5.65" r="4.6" fill="#000000" opacity="0.4"/>
  <!-- Metallic ring: 4 concentric circles -->
  <circle cx="5.25" cy="5.25" r="5.0" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
  <circle cx="5.25" cy="5.25" r="4.6" fill="none" stroke="#4a4a4a" stroke-width="0.3"/>
  <circle cx="5.25" cy="5.25" r="4.2" fill="none" stroke="#333333" stroke-width="0.3"/>
  <circle cx="5.25" cy="5.25" r="3.8" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
</svg>
