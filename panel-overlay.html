<!doctype html><html><head><meta charset="utf-8"><title>ForgeAnalogLFO — annotated panel overlay</title>
<!--
  Reproducible baking source for docs/img/panel-annotated.png (D-08, phase 27-04).
  Places docs/img/panel-raw.png (a real VCV Rack screenshot of the shipped module) as a
  CSS background and absolutely-positions 19 numbered callout badges + leader lines,
  keyed 1:1 to the legend in docs/panel.md.

  Transform (panel-raw px = LX + mm*PPM, TY + mm*PPM) was derived from the screenshot by
  detecting the OUTPUT ember ring centroid (mm 83.74,119.5) and the display's left border
  (mm 5). Control mm coordinates are transcribed from src/AnalogLFO.cpp addParam/addInput/
  addOutput. To re-bake: serve this dir over HTTP and screenshot #stage at device scale,
  then downscale to longest-edge ~1600px.
-->
<style>
@font-face{font-family:'JBMono';src:url('res/fonts/JetBrainsMonoNL-Regular.ttf') format('truetype');font-weight:400;}
html,body{margin:0;background:#0c0c0c}
#stage{position:relative;background:#0c0c0c}
#panel{position:absolute;left:220px;top:30px}
#svg{position:absolute;left:0;top:0;overflow:visible}
.badge{position:absolute;width:44px;height:44px;border-radius:50%;background:#0c0c0c;
  border:4px solid #e85d26;box-sizing:border-box;transform:translate(-50%,-50%);
  display:flex;align-items:center;justify-content:center;
  color:#e8e4e0;font-family:'JBMono',monospace;font-size:22px;line-height:1;font-weight:400}
</style></head>
<body>
<div id="stage">
  <img id="panel" src="docs/img/panel-raw.png">
  <svg id="svg"></svg>
</div>
<script>
const PPM=11.8491, LX=-3.25, TY=-7.97, MX=220, MY=30;
const CW=1520, CH=1720;
const CTRL={
 1:[45.72,32.0],2:[45.72,61.0],3:[18.00,87.0],4:[36.24,87.0],5:[54.48,87.0],6:[72.72,87.0],
 7:[7.70,108.5],8:[18.56,108.5],9:[29.43,108.5],10:[40.29,108.5],11:[51.15,108.5],
 12:[7.70,119.5],13:[18.56,119.5],14:[29.43,119.5],15:[40.29,119.5],16:[51.15,119.5],
 17:[62.01,119.5],18:[72.88,119.5],19:[83.74,119.5]};
function cc(mmx,mmy){return [MX+(LX+mmx*PPM), MY+(TY+mmy*PPM)];}
function C(n){return cc(CTRL[n][0],CTRL[n][1]);}
const P={};
P[1]={b:[120,C(1)[1]], line:[[142,C(1)[1]],[268,C(1)[1]]], op:1};
P[2]={b:[120,C(2)[1]], line:[[142,C(2)[1]],[C(2)[0]-100,C(2)[1]]], op:0.6};
[3,4,5,6].forEach(n=>{let c=C(n);P[n]={b:[c[0],c[1]-96], line:[[c[0],c[1]-74],[c[0],c[1]-66]], op:1};});
[7,8,9,10,11].forEach(n=>{let c=C(n);let gx=c[0]-66;
  P[n]={b:[c[0],1685], line:[[c[0],1663],[gx,1663],[gx,c[1]],[c[0]-30,c[1]]], op:1};});
[12,13,14,15,16,17,18,19].forEach(n=>{let c=C(n);P[n]={b:[c[0],1600], line:[[c[0],1578],[c[0],c[1]+51]], op:1};});
const stage=document.getElementById('stage');
stage.style.width=CW+'px'; stage.style.height=CH+'px';
const svg=document.getElementById('svg'); svg.setAttribute('width',CW); svg.setAttribute('height',CH);
function render(){
  for(const n in P){const e=P[n];
    const pl=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    pl.setAttribute('points', e.line.map(p=>p[0]+','+p[1]).join(' '));
    pl.setAttribute('fill','none'); pl.setAttribute('stroke','#e8e4e0');
    pl.setAttribute('stroke-width','4'); pl.setAttribute('stroke-linejoin','round');
    pl.setAttribute('stroke-linecap','round'); pl.setAttribute('opacity',e.op);
    svg.appendChild(pl);}
  for(const n in P){const e=P[n];
    const d=document.createElement('div'); d.className='badge';
    d.style.left=e.b[0]+'px'; d.style.top=e.b[1]+'px'; d.textContent=n;
    stage.appendChild(d);}
  window.__done=true;
}
const panelImg=document.getElementById('panel');
// Guard against a warm HTTP cache: a load event won't re-fire if the image is
// already complete, so render immediately in that case (WR-01).
if(panelImg.complete && panelImg.naturalWidth>0){ render(); }
else { panelImg.onload=render; panelImg.onerror=()=>{ console.error('panel-raw.png failed to load'); }; }
</script>
</body></html>
